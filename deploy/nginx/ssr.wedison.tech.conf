# nginx vhost untuk wedison-landing (SSR) di VPS.
# Mengikuti gaya vhost yang sudah ada (n8n.wedison.tech) + tambahan khusus Next.
# Pasang:  sudo cp deploy/nginx/ssr.wedison.tech.conf /etc/nginx/sites-available/ssr.wedison.tech
#          sudo ln -s /etc/nginx/sites-available/ssr.wedison.tech /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#          sudo certbot --nginx -d ssr.wedison.tech   # certbot menambah blok 443 + redirect 80->443
server {
    server_name ssr.wedison.tech;

    # Aset Next yang immutable -> cache panjang di browser.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3002;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    client_max_body_size 10M;

    # Security headers (sama dengan vhost lain)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # certbot akan menambahkan listen 443 ssl + redirect 80->443 di sini.
    listen 80;
    listen [::]:80;
}
