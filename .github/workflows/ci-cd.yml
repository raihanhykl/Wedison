name: CI/CD - Wedison (Next.js SSG → Hostinger FTP)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: Wedison-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  BUILD_DIR: out # hasil build Next.js SSG
  REMOTE_DIR: /public_html # root Hostinger kamu
  WEBSITE_URL: https://wedison.co

jobs:
  ci:
    name: Build (SSG) & Checks
    runs-on: ubuntu-latest
    env:
      TAILWIND_DISABLE_OXIDE: "1" # <- tambahkan ini
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Lint (optional)
        run: npm run lint --if-present

      # Kamu sudah set output:'export' di next.config.ts, jadi cukup 'next build' (script build kamu: next build && next-sitemap)
      - name: Build (Next.js SSG + next-sitemap)
        run: npm run build

      # Kalau next-sitemap menulis file ke /public SETELAH build, pastikan ikut ter-copy ke /out
      - name: Copy sitemap/robots to out (post-build)
        shell: bash
        run: |
          mkdir -p "${BUILD_DIR}"
          shopt -s nullglob || true
          for f in public/robots.txt public/sitemap*.xml public/*.xml.gz; do
            if [ -f "$f" ]; then
              cp -f "$f" "${BUILD_DIR}/"
            fi
          done

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-out
          path: ${{ env.BUILD_DIR }}

  deploy:
    name: Deploy to Hostinger (FTP)
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ env.WEBSITE_URL }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-out
          path: ${{ env.BUILD_DIR }}

      - name: FTP Deploy (preserve .htaccess)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_FTP_HOST }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: ${{ env.BUILD_DIR }}/
          server-dir: ${{ env.REMOTE_DIR }}/
          # PENTING: jangan hapus isi folder remote (biar .htaccess aman)
          dangerous-clean-slate: false
          # Pastikan .htaccess di server tidak dihapus/ditimpa
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.htaccess
            .htaccess
