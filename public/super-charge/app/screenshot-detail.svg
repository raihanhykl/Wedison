<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <rect width="390" height="844" fill="#111827"/>
  <!-- Status bar -->
  <rect width="390" height="44" fill="#0f0f1a"/>
  <text x="195" y="30" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle">9:41</text>
  <!-- Nav bar -->
  <text x="30" y="75" font-family="sans-serif" font-size="16" fill="#2bb075">← Back</text>
  <text x="195" y="75" font-family="sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">Station Detail</text>
  <!-- Station image placeholder -->
  <rect x="20" y="100" width="350" height="180" rx="16" fill="#1f2937"/>
  <text x="195" y="200" font-family="sans-serif" font-size="14" fill="#4b5563" text-anchor="middle">Station Photo</text>
  <!-- Station name -->
  <text x="20" y="320" font-family="sans-serif" font-size="22" fill="#fff" font-weight="bold">SuperCharge - Senayan</text>
  <text x="20" y="345" font-family="sans-serif" font-size="13" fill="#9ca3af">Jl. Asia Afrika No.8, Jakarta Pusat</text>
  <!-- Status badges -->
  <rect x="20" y="365" width="70" height="28" rx="14" fill="#2bb075" opacity="0.2"/>
  <text x="55" y="383" font-family="sans-serif" font-size="11" fill="#2bb075" text-anchor="middle">Open</text>
  <rect x="100" y="365" width="90" height="28" rx="14" fill="#3b82f6" opacity="0.2"/>
  <text x="145" y="383" font-family="sans-serif" font-size="11" fill="#3b82f6" text-anchor="middle">2 Available</text>
  <rect x="200" y="365" width="80" height="28" rx="14" fill="#f59e0b" opacity="0.2"/>
  <text x="240" y="383" font-family="sans-serif" font-size="11" fill="#f59e0b" text-anchor="middle">1 In Use</text>
  <!-- Divider -->
  <line x1="20" y1="415" x2="370" y2="415" stroke="#1f2937" stroke-width="1"/>
  <!-- Info grid -->
  <text x="20" y="450" font-family="sans-serif" font-size="14" fill="#6b7280">Charging Speed</text>
  <text x="370" y="450" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="end" font-weight="600">150 kW DC</text>
  <text x="20" y="485" font-family="sans-serif" font-size="14" fill="#6b7280">Operating Hours</text>
  <text x="370" y="485" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="end" font-weight="600">24/7</text>
  <text x="20" y="520" font-family="sans-serif" font-size="14" fill="#6b7280">Distance</text>
  <text x="370" y="520" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="end" font-weight="600">1.2 km</text>
  <text x="20" y="555" font-family="sans-serif" font-size="14" fill="#6b7280">Estimated Wait</text>
  <text x="370" y="555" font-family="sans-serif" font-size="14" fill="#2bb075" text-anchor="end" font-weight="600">No Wait</text>
  <!-- Divider -->
  <line x1="20" y1="580" x2="370" y2="580" stroke="#1f2937" stroke-width="1"/>
  <!-- Charger slots -->
  <text x="20" y="615" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">Charger Slots</text>
  <rect x="20" y="635" width="165" height="80" rx="12" fill="#1f2937"/>
  <text x="40" y="665" font-family="sans-serif" font-size="13" fill="#2bb075" font-weight="bold">Slot A</text>
  <text x="40" y="690" font-family="sans-serif" font-size="12" fill="#9ca3af">Available</text>
  <circle cx="165" cy="675" r="8" fill="#2bb075"/>
  <rect x="205" y="635" width="165" height="80" rx="12" fill="#1f2937"/>
  <text x="225" y="665" font-family="sans-serif" font-size="13" fill="#f59e0b" font-weight="bold">Slot B</text>
  <text x="225" y="690" font-family="sans-serif" font-size="12" fill="#9ca3af">In Use - 8 min left</text>
  <circle cx="350" cy="675" r="8" fill="#f59e0b"/>
  <!-- Navigate button -->
  <rect x="20" y="750" width="350" height="54" rx="12" fill="#2bb075"/>
  <text x="195" y="783" font-family="sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">Navigate to Station</text>
</svg>