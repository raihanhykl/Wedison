<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <rect width="390" height="844" fill="#1a1a2e"/>
  <!-- Status bar -->
  <rect width="390" height="44" fill="#0f0f1a"/>
  <text x="195" y="30" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle">9:41</text>
  <!-- Map area -->
  <rect x="0" y="44" width="390" height="500" fill="#2a3a4a"/>
  <!-- Map grid lines -->
  <line x1="0" y1="144" x2="390" y2="144" stroke="#3a4a5a" stroke-width="0.5"/>
  <line x1="0" y1="244" x2="390" y2="244" stroke="#3a4a5a" stroke-width="0.5"/>
  <line x1="0" y1="344" x2="390" y2="344" stroke="#3a4a5a" stroke-width="0.5"/>
  <line x1="0" y1="444" x2="390" y2="444" stroke="#3a4a5a" stroke-width="0.5"/>
  <line x1="97" y1="44" x2="97" y2="544" stroke="#3a4a5a" stroke-width="0.5"/>
  <line x1="195" y1="44" x2="195" y2="544" stroke="#3a4a5a" stroke-width="0.5"/>
  <line x1="293" y1="44" x2="293" y2="544" stroke="#3a4a5a" stroke-width="0.5"/>
  <!-- Charging station pins -->
  <circle cx="120" cy="200" r="16" fill="#2bb075"/>
  <text x="120" y="205" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">⚡</text>
  <circle cx="250" cy="300" r="16" fill="#2bb075"/>
  <text x="250" y="305" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">⚡</text>
  <circle cx="180" cy="420" r="16" fill="#2bb075"/>
  <text x="180" y="425" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">⚡</text>
  <circle cx="310" cy="180" r="16" fill="#1a8a5a"/>
  <text x="310" y="185" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">⚡</text>
  <circle cx="80" cy="380" r="16" fill="#1a8a5a"/>
  <text x="80" y="385" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">⚡</text>
  <!-- User location -->
  <circle cx="195" cy="320" r="8" fill="#4a9eff"/>
  <circle cx="195" cy="320" r="16" fill="#4a9eff" opacity="0.2"/>
  <!-- Bottom card -->
  <rect x="0" y="544" width="390" height="300" rx="24" fill="#111827"/>
  <!-- Search bar -->
  <rect x="20" y="564" width="350" height="44" rx="22" fill="#1f2937"/>
  <text x="50" y="591" font-family="sans-serif" font-size="14" fill="#6b7280">Search charging stations...</text>
  <!-- Station card -->
  <rect x="20" y="628" width="350" height="90" rx="12" fill="#1f2937"/>
  <circle cx="55" cy="673" r="20" fill="#2bb075" opacity="0.2"/>
  <text x="55" y="678" font-family="sans-serif" font-size="16" fill="#2bb075" text-anchor="middle">⚡</text>
  <text x="90" y="660" font-family="sans-serif" font-size="15" fill="#fff" font-weight="bold">SuperCharge - Senayan</text>
  <text x="90" y="680" font-family="sans-serif" font-size="12" fill="#9ca3af">2 available • 1.2 km away</text>
  <rect x="90" y="690" width="60" height="20" rx="10" fill="#2bb075" opacity="0.2"/>
  <text x="120" y="704" font-family="sans-serif" font-size="10" fill="#2bb075" text-anchor="middle">Open</text>
  <!-- Station card 2 -->
  <rect x="20" y="738" width="350" height="90" rx="12" fill="#1f2937"/>
  <circle cx="55" cy="783" r="20" fill="#2bb075" opacity="0.2"/>
  <text x="55" y="788" font-family="sans-serif" font-size="16" fill="#2bb075" text-anchor="middle">⚡</text>
  <text x="90" y="770" font-family="sans-serif" font-size="15" fill="#fff" font-weight="bold">SuperCharge - Sudirman</text>
  <text x="90" y="790" font-family="sans-serif" font-size="12" fill="#9ca3af">4 available • 3.5 km away</text>
  <rect x="90" y="800" width="60" height="20" rx="10" fill="#2bb075" opacity="0.2"/>
  <text x="120" y="814" font-family="sans-serif" font-size="10" fill="#2bb075" text-anchor="middle">Open</text>
