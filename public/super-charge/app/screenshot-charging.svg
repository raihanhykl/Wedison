<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <rect width="390" height="844" fill="#111827"/>
  <!-- Status bar -->
  <rect width="390" height="44" fill="#0f0f1a"/>
  <text x="195" y="30" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle">9:41</text>
  <!-- Nav bar -->
  <text x="195" y="75" font-family="sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">Charging Session</text>
  <!-- Charging circle -->
  <circle cx="195" cy="250" r="100" fill="none" stroke="#1f2937" stroke-width="8"/>
  <path d="M195 150 a100 100 0 1 1 -70.7 170.7" fill="none" stroke="#2bb075" stroke-width="8" stroke-linecap="round"/>
  <text x="195" y="235" font-family="sans-serif" font-size="42" fill="#fff" text-anchor="middle" font-weight="bold">72%</text>
  <text x="195" y="265" font-family="sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Charging...</text>
  <!-- Charging stats -->
  <rect x="30" y="390" width="100" height="80" rx="12" fill="#1f2937"/>
  <text x="80" y="420" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Power</text>
  <text x="80" y="450" font-family="sans-serif" font-size="18" fill="#fff" text-anchor="middle" font-weight="bold">45 kW</text>
  <rect x="145" y="390" width="100" height="80" rx="12" fill="#1f2937"/>
  <text x="195" y="420" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Time Left</text>
  <text x="195" y="450" font-family="sans-serif" font-size="18" fill="#2bb075" text-anchor="middle" font-weight="bold">8 min</text>
  <rect x="260" y="390" width="100" height="80" rx="12" fill="#1f2937"/>
  <text x="310" y="420" font-family="sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Energy</text>
  <text x="310" y="450" font-family="sans-serif" font-size="18" fill="#fff" text-anchor="middle" font-weight="bold">2.4 kWh</text>
  <!-- Divider -->
  <line x1="30" y1="505" x2="360" y2="505" stroke="#1f2937" stroke-width="1"/>
  <!-- Session details -->
  <text x="30" y="545" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">Session Details</text>
  <text x="30" y="580" font-family="sans-serif" font-size="13" fill="#6b7280">Station</text>
  <text x="360" y="580" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="end">SuperCharge - Senayan</text>
  <text x="30" y="610" font-family="sans-serif" font-size="13" fill="#6b7280">Slot</text>
  <text x="360" y="610" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="end">Slot A</text>
  <text x="30" y="640" font-family="sans-serif" font-size="13" fill="#6b7280">Start Time</text>
  <text x="360" y="640" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="end">14:23</text>
  <text x="30" y="670" font-family="sans-serif" font-size="13" fill="#6b7280">Duration</text>
  <text x="360" y="670" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="end">7 min</text>
  <text x="30" y="700" font-family="sans-serif" font-size="13" fill="#6b7280">Estimated Cost</text>
  <text x="360" y="700" font-family="sans-serif" font-size="13" fill="#2bb075" text-anchor="end" font-weight="600">Rp 12.000</text>
  <!-- Stop button -->
  <rect x="30" y="750" width="330" height="54" rx="12" fill="#ef4444"/>
  <text x="195" y="783" font-family="sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">Stop Charging</text>
</svg>