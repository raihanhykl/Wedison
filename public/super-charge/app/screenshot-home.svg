<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <rect width="390" height="844" fill="#111827"/>
  <!-- Status bar -->
  <rect width="390" height="44" fill="#0f0f1a"/>
  <text x="195" y="30" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle">9:41</text>
  <!-- Header -->
  <text x="30" y="80" font-family="sans-serif" font-size="13" fill="#9ca3af">Good Morning,</text>
  <text x="30" y="105" font-family="sans-serif" font-size="22" fill="#fff" font-weight="bold">Raihan 👋</text>
  <!-- Battery card -->
  <rect x="20" y="130" width="350" height="160" rx="16" fill="url(#grad1)"/>
  <defs>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2bb075"/>
      <stop offset="100%" stop-color="#1a6844"/>
    </linearGradient>
  </defs>
  <text x="40" y="170" font-family="sans-serif" font-size="13" fill="#fff" opacity="0.8">Your Vehicle Battery</text>
  <text x="40" y="215" font-family="sans-serif" font-size="40" fill="#fff" font-weight="bold">85%</text>
  <text x="40" y="240" font-family="sans-serif" font-size="13" fill="#fff" opacity="0.8">~62 km remaining</text>
  <rect x="40" y="257" width="180" height="6" rx="3" fill="#fff" opacity="0.2"/>
  <rect x="40" y="257" width="153" height="6" rx="3" fill="#fff"/>
  <!-- Vehicle icon placeholder -->
  <text x="330" y="210" font-family="sans-serif" font-size="48" fill="#fff" text-anchor="middle" opacity="0.3">🏍</text>
  <!-- Quick actions -->
  <text x="20" y="330" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">Quick Actions</text>
  <rect x="20" y="350" width="110" height="90" rx="12" fill="#1f2937"/>
  <text x="75" y="385" font-family="sans-serif" font-size="24" text-anchor="middle">📍</text>
  <text x="75" y="420" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">Find Station</text>
  <rect x="140" y="350" width="110" height="90" rx="12" fill="#1f2937"/>
  <text x="195" y="385" font-family="sans-serif" font-size="24" text-anchor="middle">⚡</text>
  <text x="195" y="420" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">Start Charge</text>
  <rect x="260" y="350" width="110" height="90" rx="12" fill="#1f2937"/>
  <text x="315" y="385" font-family="sans-serif" font-size="24" text-anchor="middle">📊</text>
  <text x="315" y="420" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle">History</text>
  <!-- Nearby stations -->
  <text x="20" y="490" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">Nearby Stations</text>
  <text x="370" y="490" font-family="sans-serif" font-size="13" fill="#2bb075" text-anchor="end">See All</text>
  <!-- Station 1 -->
  <rect x="20" y="510" width="350" height="80" rx="12" fill="#1f2937"/>
  <circle cx="55" cy="550" r="20" fill="#2bb075" opacity="0.15"/>
  <text x="55" y="556" font-family="sans-serif" font-size="16" fill="#2bb075" text-anchor="middle">⚡</text>
  <text x="85" y="540" font-family="sans-serif" font-size="14" fill="#fff" font-weight="600">SC - Senayan City</text>
  <text x="85" y="560" font-family="sans-serif" font-size="11" fill="#9ca3af">3 available • 1.2 km</text>
  <text x="350" y="550" font-family="sans-serif" font-size="11" fill="#2bb075" text-anchor="end">Open</text>
  <!-- Station 2 -->
  <rect x="20" y="600" width="350" height="80" rx="12" fill="#1f2937"/>
  <circle cx="55" cy="640" r="20" fill="#2bb075" opacity="0.15"/>
  <text x="55" y="646" font-family="sans-serif" font-size="16" fill="#2bb075" text-anchor="middle">⚡</text>
  <text x="85" y="630" font-family="sans-serif" font-size="14" fill="#fff" font-weight="600">SC - Sudirman</text>
  <text x="85" y="650" font-family="sans-serif" font-size="11" fill="#9ca3af">2 available • 3.5 km</text>
  <text x="350" y="640" font-family="sans-serif" font-size="11" fill="#2bb075" text-anchor="end">Open</text>
  <!-- Station 3 -->
  <rect x="20" y="690" width="350" height="80" rx="12" fill="#1f2937"/>
  <circle cx="55" cy="730" r="20" fill="#f59e0b" opacity="0.15"/>
  <text x="55" y="736" font-family="sans-serif" font-size="16" fill="#f59e0b" text-anchor="middle">⚡</text>
  <text x="85" y="720" font-family="sans-serif" font-size="14" fill="#fff" font-weight="600">SC - Kuningan</text>
  <text x="85" y="740" font-family="sans-serif" font-size="11" fill="#9ca3af">0 available • 5.1 km</text>
  <text x="350" y="730" font-family="sans-serif" font-size="11" fill="#f59e0b" text-anchor="end">Busy</text>
  <!-- Bottom nav -->
  <rect x="0" y="790" width="390" height="54" fill="#1f2937"/>
  <text x="65" y="825" font-family="sans-serif" font-size="10" fill="#2bb075" text-anchor="middle">Home</text>
  <text x="195" y="825" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Map</text>
  <text x="325" y="825" font-family="sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Profile</text>
</svg>